<!DOCTYPE html>
<!-- page: index (language list) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="page-id" content="index" />
  <title>Rock Paper Scissors</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 { font-size: 2rem; color: #333; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 30px; font-size: 0.95rem; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-btn {
      display: block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 1rem;
      transition: opacity 0.2s ease;
    }
    .link-btn:hover { opacity: 0.85; }
    .link-btn .desc { font-size: 0.8rem; opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✊ Rock Paper Scissors</h1>
    <p>Choose an implementation to play:</p>
    <div class="links">
      <a class="link-btn" href="/javascript/">
        JavaScript
        <div class="desc">Vanilla JS · No dependencies</div>
      </a>
      <a class="link-btn" href="/node/">
        Node
        <div class="desc">Node.js · Server-side rendering</div>
      </a>
      <a class="link-btn" href="/go/">
        Go
        <div class="desc">Go · Server-side rendering</div>
      </a>
      <a class="link-btn" href="/nextjs/">
        Next.js
        <div class="desc">Next.js · Server Actions &amp; App Router</div>
      </a>
      <a class="link-btn" href="/typescript/">
        TypeScript
        <div class="desc">TypeScript · Server-side rendering</div>
      </a>
      <a class="link-btn" href="/astro/">
        Astro
        <div class="desc">Astro · Server-side rendering</div>
      </a>
    </div>
  </div>
</body>
</html>
