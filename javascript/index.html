<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>✊ Rock Paper Scissors</h1>

    <div class="score-board">
      <div class="score-item">
        <div class="score-label">Win</div>
        <div class="score-value win" id="win-count">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Draw</div>
        <div class="score-value draw" id="draw-count">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Lose</div>
        <div class="score-value lose" id="lose-count">0</div>
      </div>
    </div>

    <div class="choices">
      <button class="choice-btn" onclick="play('rock')" aria-label="Rock">
        ✊
        <span class="label">Rock</span>
      </button>
      <button class="choice-btn" onclick="play('paper')" aria-label="Paper">
        🖐️
        <span class="label">Paper</span>
      </button>
      <button class="choice-btn" onclick="play('scissors')" aria-label="Scissors">
        ✌️
        <span class="label">Scissors</span>
      </button>
    </div>

    <div class="battle-area" id="battle-area">
      <p class="waiting-text">Choose your move!</p>
    </div>

    <button class="reset-btn" onclick="resetScore()">Reset Score</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
